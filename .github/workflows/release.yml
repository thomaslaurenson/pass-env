name: Release

on: workflow_call

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Read version from src/env.bash
        id: version
        run: |
          python3 - <<'PY'
          import re, pathlib, os
          content = pathlib.Path("src/env.bash").read_text()
          match = re.search(r"""^VERSION=["']?([^"'#\s]+)""", content, re.MULTILINE)
          if not match:
              raise SystemExit("ERROR: VERSION not found in src/env.bash")
          version = match.group(1)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"value={version}\n")
          PY

      - name: Verify version matches tag
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          TAG="${{ github.ref_name }}"
          EXPECTED="${TAG#v}"
          if [[ "$VERSION" != "$EXPECTED" ]]; then
            echo "ERROR: src/env.bash version ($VERSION) does not match tag ($TAG)"
            exit 1
          fi

      - name: Build tarball
        run: |
          version="${{ github.ref_name }}"
          archive="pass-env-${version}.tar.gz"
          git archive --prefix="pass-env-${version}/" HEAD | gzip > "${archive}"
          echo "ARCHIVE=${archive}" >> "$GITHUB_ENV"

      - name: Bake version into install.sh
        run: |
          cp scripts/install.sh install.sh
          sed -i 's/^VERSION=.*/VERSION="${{ github.ref_name }}"/' install.sh

      - name: Extract release notes
        run: |
          ver="${{ github.ref_name }}"
          ver="${ver#v}"
          awk -v ver="$ver" '
            /^## / { if (found) exit; if ($0 == "## " ver || index($0, "## " ver " ")) { found=1 }; next }
            found  { print }
          ' CHANGELOG.md | sed -e '/[^[:space:]]/,$!d' > release_notes.md

      - name: Generate checksums
        run: |
          sha256sum "${{ env.ARCHIVE }}" install.sh > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          fail_on_unmatched_files: true
          files: |
            ${{ env.ARCHIVE }}
            install.sh
            checksums.txt
