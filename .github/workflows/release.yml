name: Release

on: workflow_call

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Verify version matches tag
        run: |
          version=$(grep '^VERSION=' src/env.bash | sed 's/VERSION="\(.*\)"/\1/')
          tag="${{ github.ref_name }}"
          expected="${tag#v}"
          if [[ "$version" != "$expected" ]]; then
            echo "ERROR: VERSION in src/env.bash ($version) does not match tag ($tag)"
            exit 1
          fi

      - name: Build tarball
        run: |
          version="${{ github.ref_name }}"
          archive="pass-env-${version}.tar.gz"
          git archive --prefix="pass-env-${version}/" HEAD | gzip > "${archive}"
          echo "ARCHIVE=${archive}" >> "$GITHUB_ENV"

      - name: Bake version into install.sh
        run: |
          cp scripts/install.sh install.sh
          sed -i 's/^VERSION=.*/VERSION="${{ github.ref_name }}"/' install.sh

      - name: Extract release notes
        run: |
          ver="${{ github.ref_name }}"
          ver="${ver#v}"
          awk -v ver="$ver" '
            /^## / { if (found) exit; if (index($0, "## " ver)) { found=1 }; next }
            found  { print }
          ' CHANGELOG.md | sed -e '/[^[:space:]]/,$!d' > release_notes.md

      - name: Generate checksums
        run: |
          sha256sum "${{ env.ARCHIVE }}" install.sh > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            ${{ env.ARCHIVE }}
            install.sh
            checksums.txt
